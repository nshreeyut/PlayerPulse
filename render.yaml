services:
  - type: web
    name: playerpulse-api
    runtime: python
    buildCommand: pip install uv && uv sync
    startCommand: uv run uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: LLM_PROVIDER
        value: nvidia
      - key: NVIDIA_API_KEY
        sync: false
      - key: STEAM_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false   # set to your Vercel URL, e.g. https://playerpulse.vercel.app
